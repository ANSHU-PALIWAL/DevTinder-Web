# NGINX Configuration Snippet for ConnectNeighbour Frontend
# Include this block in your server {} directive on AWS Ubuntu NGINX.

server {
    # (Assuming you have listen 443 ssl and server_name set up here)
    # ...

    root /path/to/connectneighbour/devTinder-Web/dist; # Adjust to your actual build path
    index index.html;

    # 1. Base route: serve index.html for React Router
    location / {
        try_files $uri $uri/ /index.html;
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        
        # HSTS (Strict-Transport-Security) for 1 year
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        
        # Content Security Policy (Basic Fallback)
        add_header Content-Security-Policy "default-src 'self' https: data: 'unsafe-inline' 'unsafe-eval';" always;

        # index.html should NEVER be cached to ensure users get the latest JS bundle names
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # 2. Cache Vite Build Assets (JS, CSS, hashed images) for 1 year
    # Vite bundles these with unique content hashes, so they are safe to cache forever.
    location ~* \.(?:css|js)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # 3. Cache media and fonts for 1 year
    location ~* \.(?:jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|webp|avif|woff2?|eot|ttf|otf)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # 4. Service Worker caching (should not be overly aggressive)
    location ~* (service-worker\.js|sw\.js|registerSW\.js)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
        access_log off;
    }
}
